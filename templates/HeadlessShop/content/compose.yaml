services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: headless_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d headless_shop"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - headless-shop-postgres:/var/lib/postgresql/data

volumes:
  headless-shop-postgres:
