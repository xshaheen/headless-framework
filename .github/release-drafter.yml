name-template: "$RESOLVED_VERSION"
tag-template: "$RESOLVED_VERSION"
change-template: "- $TITLE by @$AUTHOR (#$NUMBER)"
no-changes-template: "- No changes"
categories:
  - title: "🚀 Features"
    labels:
      - enhancement
  - title: "🐛 Fixes"
    labels:
      - bug
  - title: "📚 Documentation"
    labels:
      - documentation
  - title: "🧰 Maintenance"
    labels:
      - maintenance
version-resolver:
  major:
    labels:
      - major
  minor:
    labels:
      - minor
  patch:
    labels:
      - patch
  default: patch
template: |
  $CHANGES

  ## Contributors

  $CONTRIBUTORS
autolabeler:
  - label: documentation
    files:
      - "README.md"
      - "docs/**/*"
      - "llms*.txt"
      - ".github/**/*.md"
  - label: enhancement
    files:
      - "src/**/*"
      - "demo/**/*"
  - label: maintenance
    files:
      - ".github/**/*.yml"
      - ".github/workflows/**/*"
      - "build/**/*"
      - "build.ps1"
      - "build.sh"
      - "tests/**/*"
      - "Directory.*"
      - "global.json"
      - "nuget.config"
