version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    target-branch: main
    labels:
      - maintenance
    commit-message:
      prefix: build
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC

  - package-ecosystem: docker
    directory: /
    target-branch: main
    labels:
      - maintenance
    commit-message:
      prefix: build
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    labels:
      - maintenance
    commit-message:
      prefix: ci
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
