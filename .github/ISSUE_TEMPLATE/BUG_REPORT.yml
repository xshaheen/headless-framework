name: Bug report
description: Report a reproducible defect in a Headless package or workflow
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report.

        Use this form for reproducible bugs. For security issues, follow the private reporting steps in `SECURITY.md`.
  - type: input
    id: package
    attributes:
      label: Affected package
      description: Which `Headless.*` package or workflow is failing?
      placeholder: Headless.Caching.Redis
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      description: Include the version or commit where you observed the issue.
      placeholder: 1.2.3
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime and host
      description: Include OS, .NET SDK/runtime, and any relevant hosting details.
      placeholder: .NET 10 on Ubuntu 24.04, ASP.NET Core, Docker
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste a minimal repro, sample config, or failing test.
      render: csharp
      placeholder: |
        var builder = WebApplication.CreateBuilder(args);
        // minimal repro here
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste the relevant output if available.
      render: shell
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Dependencies, provider choice, screenshots, or anything else that narrows the issue.
