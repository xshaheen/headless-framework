name: Messaging Transport Conformance

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  HUSKY: 0

jobs:
  docker-conformance:
    name: "${{ matrix.name }} conformance"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - key: nats
            name: NATS
            provider: NATS
            project: tests/Headless.Messaging.Nats.Tests.Integration/Headless.Messaging.Nats.Tests.Integration.csproj
            expected_tests: |
              Tests.NatsConsumerClientTests.should_round_trip_queue_message_body_and_headers
              Tests.NatsConsumerClientTests.should_dispatch_empty_message_body
              Tests.NatsConsumerClientTests.should_commit_real_delivery_and_prevent_redelivery
              Tests.NatsConsumerClientTests.should_reject_real_delivery_and_observe_redelivery
              Tests.NatsConsumerClientTests.should_isolate_unique_destinations
              Tests.NatsConsumerClientTests.should_shutdown_idle_consumer_within_bound
              Tests.NatsConsumerClientTests.should_bound_shutdown_while_handler_is_active
              Tests.NatsBrokerFaultTests.should_resume_delivery_once_after_consumer_pause
          - key: rabbitmq
            name: RabbitMQ
            provider: RabbitMQ
            project: tests/Headless.Messaging.RabbitMq.Tests.Integration/Headless.Messaging.RabbitMq.Tests.Integration.csproj
            expected_tests: |
              Tests.RabbitMqConsumerClientConformanceTests.should_round_trip_queue_message_body_and_headers
              Tests.RabbitMqConsumerClientConformanceTests.should_dispatch_empty_message_body
              Tests.RabbitMqConsumerClientConformanceTests.should_commit_real_delivery_and_prevent_redelivery
              Tests.RabbitMqConsumerClientConformanceTests.should_reject_real_delivery_and_observe_redelivery
              Tests.RabbitMqConsumerClientConformanceTests.should_isolate_unique_destinations
              Tests.RabbitMqConsumerClientConformanceTests.should_shutdown_idle_consumer_within_bound
              Tests.RabbitMqConsumerClientConformanceTests.should_bound_shutdown_while_handler_is_active
              Tests.RabbitMqBrokerFaultTests.should_resume_delivery_once_after_consumer_pause
          - key: aws-localstack
            name: AWS LocalStack
            provider: AWS/LocalStack
            project: tests/Headless.Messaging.Aws.Tests.Integration/Headless.Messaging.Aws.Tests.Integration.csproj
            expected_tests: |
              Tests.AmazonSqsConsumerClientConformanceTests.should_round_trip_queue_message_body_and_headers
              Tests.AmazonSqsConsumerClientConformanceTests.should_commit_real_delivery_and_prevent_redelivery
              Tests.AmazonSqsConsumerClientConformanceTests.should_reject_real_delivery_and_observe_redelivery
              Tests.AmazonSqsConsumerClientConformanceTests.should_isolate_unique_destinations
              Tests.AmazonSqsConsumerClientConformanceTests.should_shutdown_idle_consumer_within_bound
              Tests.AmazonSqsConsumerClientConformanceTests.should_bound_shutdown_while_handler_is_active
          - key: kafka
            name: Kafka
            provider: Kafka
            project: tests/Headless.Messaging.Kafka.Tests.Integration/Headless.Messaging.Kafka.Tests.Integration.csproj
            expected_tests: |
              Tests.KafkaConsumerClientConformanceTests.should_round_trip_queue_message_body_and_headers
              Tests.KafkaConsumerClientConformanceTests.should_commit_real_delivery_and_prevent_redelivery
              Tests.KafkaConsumerClientConformanceTests.should_reject_real_delivery_and_observe_redelivery
              Tests.KafkaConsumerClientConformanceTests.should_isolate_unique_destinations
              Tests.KafkaConsumerClientConformanceTests.should_shutdown_idle_consumer_within_bound
              Tests.KafkaConsumerClientConformanceTests.should_bound_shutdown_while_handler_is_active
              Tests.KafkaBrokerFaultTests.should_resume_delivery_once_after_consumer_pause
          - key: pulsar
            name: Pulsar
            provider: Pulsar
            project: tests/Headless.Messaging.Pulsar.Tests.Integration/Headless.Messaging.Pulsar.Tests.Integration.csproj
            expected_tests: |
              Tests.PulsarConsumerClientHarnessTests.should_round_trip_queue_message_body_and_headers
              Tests.PulsarConsumerClientHarnessTests.should_commit_real_delivery_and_prevent_redelivery
              Tests.PulsarConsumerClientHarnessTests.should_reject_real_delivery_and_observe_redelivery
              Tests.PulsarConsumerClientHarnessTests.should_isolate_unique_destinations
              Tests.PulsarConsumerClientHarnessTests.should_shutdown_idle_consumer_within_bound
              Tests.PulsarConsumerClientHarnessTests.should_bound_shutdown_while_handler_is_active
              Tests.PulsarBrokerFaultTests.should_resume_delivery_once_after_consumer_pause
              Tests.PulsarTransportTests.should_fan_out_bus_delivery_to_distinct_subscriptions

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: "Setup .NET SDK"
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: "./global.json"

      - name: "Setup NuGet cache"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: "Restore provider project"
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_PROJECT: ${{ matrix.project }}
        run: make restore-project PROJECT="$TEST_PROJECT"

      - name: "Build provider project"
        env:
          TEST_PROJECT: ${{ matrix.project }}
        run: make build-project-no-restore PROJECT="$TEST_PROJECT"

      - name: "Run provider conformance"
        env:
          RESULT_KEY: ${{ matrix.key }}
          TEST_PROJECT: ${{ matrix.project }}
        run: >-
          dotnet test
          --project "$TEST_PROJECT"
          --configuration Release
          --no-build
          --no-restore
          --results-directory "artifacts/test-results/$RESULT_KEY"
          --report-trx

      - name: "Verify exact conformance evidence"
        env:
          CONFORMANCE_PROVIDER: ${{ matrix.provider }}
          EXPECTED_CONFORMANCE_TESTS: ${{ matrix.expected_tests }}
          RESULT_KEY: ${{ matrix.key }}
        run: |
          python3 eng/verify_messaging_conformance.py \
            --provider "$CONFORMANCE_PROVIDER" \
            --results-directory "artifacts/test-results/$RESULT_KEY" \
            --expected-tests "$EXPECTED_CONFORMANCE_TESTS"

      - name: "Upload provider results"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: messaging-${{ matrix.key }}-conformance-results
          path: artifacts/test-results/${{ matrix.key }}
          if-no-files-found: error
          retention-days: 14
