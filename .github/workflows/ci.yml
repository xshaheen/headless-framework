name: Build and Pack

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable the .NET logo in the console output.
  DOTNET_NOLOGO: true
  # Disable the .NET first time experience to skip caching NuGet packages and speed up the build.
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending .NET CLI telemetry to Microsoft.
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Set the build number in MinVer.
  MINVERBUILDMETADATA: build.${{github.run_number}}
  # Build Configuration
  CONFIGURATION: Release
  # Packages Directory
  PACKAGES_DIR: ./artifacts/packages-results
  # SBOM metadata namespace base
  SBOM_NAMESPACE_BASE: https://github.com/xshaheen/headless-framework
  # Set the NuGet packages restore cache directory.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # Disable the Husky pre-commit hooks.
  HUSKY: 0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0

      - name: "Setup .NET SDK"
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: "./global.json"

      - name: "Setup nuget cache"
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: "Authenticate GitHub Packages"
        run: dotnet nuget update source github.com --username xshaheen --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile nuget.config
        shell: bash

      - name: "Build"
        run: dotnet build --configuration ${{ env.CONFIGURATION }}

      - name: "Pack"
        run: dotnet pack --configuration ${{ env.CONFIGURATION }} --no-build --include-symbols --output ${{ env.PACKAGES_DIR }}

      - name: "Generate SBOM"
        run: |
          dotnet tool restore
          curl -Lo "${RUNNER_TEMP}/sbom-tool" https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-linux-x64
          chmod +x "${RUNNER_TEMP}/sbom-tool"
          PACKAGE_VERSION="$(dotnet tool run minver)"
          "${RUNNER_TEMP}/sbom-tool" generate \
            -b "${PACKAGES_DIR}" \
            -bc "${GITHUB_WORKSPACE}" \
            -pn "headless-framework" \
            -pv "${PACKAGE_VERSION}" \
            -ps "Mahmoud Shaheen" \
            -nsb "${SBOM_NAMESPACE_BASE}"
        shell: bash

      - name: "Publish Artifacts"
        uses: actions/upload-artifact@v7
        with:
          name: packages-results
          path: ${{ env.PACKAGES_DIR }}

  push-github-packages:
    name: "Push GitHub Packages"
    needs: build
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    permissions:
      packages: write

    environment:
      name: "GitHub Packages"
      url: https://github.com/xshaheen/headless-framework/packages

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: packages-results

      - name: ".NET NuGet Add Source"
        run: dotnet nuget add source https://nuget.pkg.github.com/xshaheen/index.json --name github.com --username xshaheen --password ${{ secrets.NUGET_API_KEY }} --store-password-in-clear-text
        shell: pwsh

      - name: ".NET NuGet Push"
        run: dotnet nuget push .\*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source github.com --skip-duplicate
        shell: pwsh

      - name: ".NET Symbols Push"
        run: dotnet nuget push .\*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source github.com --skip-duplicate
        shell: pwsh
