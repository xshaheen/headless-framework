name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'Makefile'
      - 'eng/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'Makefile'
      - 'eng/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Disable the .NET logo in the console output.
  DOTNET_NOLOGO: true
  # Disable the .NET first time experience to skip caching NuGet packages and speed up the build.
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending .NET CLI telemetry to Microsoft.
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Set the build number in MinVer.
  MINVERBUILDMETADATA: build.${{github.run_number}}
  # Build Configuration
  CONFIGURATION: Release
  # Packages Directory
  PACKAGES_DIR: ./artifacts/packages-results
  # Set the NuGet packages restore cache directory.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # Disable the Husky pre-commit hooks.
  HUSKY: 0

jobs:
  build:
    name: Build and pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false
          fetch-depth: 0

      - name: "Setup .NET SDK"
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          global-json-file: "./global.json"

      # Required: the dashboard SPAs are pre-built in the "Build dashboard SPAs"
      # step below (before the NuGet token is present), so the token-bearing
      # solution build runs with BuildDashboardSpa=false and never executes npm
      # lifecycle scripts while the credential is available in the environment.
      - name: "Setup Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/Headless.Jobs.Dashboard/wwwroot/package-lock.json
            src/Headless.Messaging.Dashboard/wwwroot/package-lock.json

      - name: "Setup nuget cache"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Build the dashboard SPAs BEFORE the NuGet token is present, so a malicious
      # dependency lifecycle script run by `npm ci` cannot read it. The token is
      # injected only on the "Format, build, and pack" step below, which runs with
      # BuildDashboardSpa=false and only embeds the already-built wwwroot/dist.
      - name: "Build dashboard SPAs"
        run: make dashboards
        shell: bash

      - name: "Format, build, and pack"
        # Dashboards are already built above (before the token is present), so we skip
        # the in-build npm step (BuildDashboardSpa=false) and no lifecycle scripts run
        # while the credential is available. GITHUB_PACKAGES_TOKEN is scoped to THIS step
        # only — the earlier `npm ci` never sees it, and it is never written to disk.
        # NuGet expands it from nuget.config's %GITHUB_PACKAGES_TOKEN% credential entry.
        env:
          BuildDashboardSpa: "false"
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make ci-build

      - name: "Publish Artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-results
          path: ${{ env.PACKAGES_DIR }}
          if-no-files-found: error

  push-github-packages:
    name: "Push GitHub Packages"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    environment:
      name: "GitHub Packages"
      url: https://github.com/xshaheen/headless-framework/packages

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done
        shell: bash

  push-nuget-packages:
    name: "Push nuget.org packages"
    needs: push-github-packages
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read

    environment:
      name: "NuGet Release"
      url: https://www.nuget.org/packages?q=Headless.

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            if ! unzip -Z1 "$symbol" | grep -Eiq '\.pdb$'; then
              echo "Skipping $symbol because it does not contain any .pdb files."
              continue
            fi

            dotnet nuget push "$symbol" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate \
              || echo "::warning::Skipping failed symbol package push for $symbol."
          done
        shell: bash
