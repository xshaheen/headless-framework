name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Disable the .NET logo in the console output.
  DOTNET_NOLOGO: true
  # Disable the .NET first time experience to skip caching NuGet packages and speed up the build.
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending .NET CLI telemetry to Microsoft.
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Set the build number in MinVer.
  MINVERBUILDMETADATA: build.${{github.run_number}}
  # Build Configuration
  CONFIGURATION: Release
  # Packages Directory
  PACKAGES_DIR: ./artifacts/packages-results
  # Test Results Directory
  TEST_RESULTS_DIR: ./artifacts/test-results
  # Set the NuGet packages restore cache directory.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # Disable the Husky pre-commit hooks.
  HUSKY: 0

jobs:
  build:
    name: Build and pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2
        with:
          lfs: false
          fetch-depth: 0

      - name: "Setup .NET SDK"
        uses: actions/setup-dotnet@v5.2.0
        with:
          global-json-file: "./global.json"

      - name: "Setup nuget cache"
        uses: actions/cache@v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: "Authenticate GitHub Packages"
        run: dotnet nuget update source github.com --username xshaheen --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --configfile nuget.config
        shell: bash

      - name: "Restore"
        run: dotnet restore headless-framework.slnx

      - name: "Build"
        run: dotnet build headless-framework.slnx --configuration ${{ env.CONFIGURATION }} --no-restore --no-incremental -v:q -nologo /clp:ErrorsOnly

      - name: "Test unit projects"
        if: github.event_name == 'release'
        run: |
          set -euo pipefail
          shopt -s nullglob

          unit_test_projects=(tests/*.Tests.Unit/*.csproj)

          if [ ${#unit_test_projects[@]} -eq 0 ]; then
            echo "No unit test projects found."
            exit 1
          fi

          for test_project in "${unit_test_projects[@]}"; do
            project_file="${test_project##*/}"
            project_name="${project_file%.csproj}"

            dotnet test "$test_project" \
              --configuration "${CONFIGURATION}" \
              --no-restore \
              --no-build \
              --logger "trx;LogFilePrefix=${project_name}" \
              --results-directory "${TEST_RESULTS_DIR}"
          done
        shell: bash

      - name: "Pack"
        run: |
          set -euo pipefail
          for csproj in src/*/*.csproj; do
            dotnet pack "$csproj" --configuration "${CONFIGURATION}" --no-restore --no-build --include-symbols --output "${PACKAGES_DIR}"
          done
        shell: bash

      - name: "Publish Test Results"
        if: always() && github.event_name == 'release'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-results
          path: ${{ env.TEST_RESULTS_DIR }}
          if-no-files-found: ignore

      - name: "Publish Artifacts"
        uses: actions/upload-artifact@v7.0.1
        with:
          name: packages-results
          path: ${{ env.PACKAGES_DIR }}
          if-no-files-found: error

  push-github-packages:
    name: "Push GitHub Packages"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    environment:
      name: "GitHub Packages"
      url: https://github.com/xshaheen/headless-framework/packages

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done
        shell: bash

  push-nuget-packages:
    name: "Push nuget.org packages"
    needs: push-github-packages
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read

    environment:
      name: "NuGet Release"
      url: https://www.nuget.org/packages?q=Headless.

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done
        shell: bash
