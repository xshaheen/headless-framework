name: CI

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'Makefile'
      - 'eng/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/**'
      - '.husky/**'
      - 'Makefile'
      - 'eng/**'
      - 'src/**'
      - 'tests/**'
      - 'Directory.*'
      - 'global.json'
      - 'headless-framework.slnx'
      - 'nuget.config'
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Disable the .NET logo in the console output.
  DOTNET_NOLOGO: true
  # Disable the .NET first time experience to skip caching NuGet packages and speed up the build.
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  # Disable sending .NET CLI telemetry to Microsoft.
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Set the build number in MinVer.
  MINVERBUILDMETADATA: build.${{github.run_number}}
  # Build Configuration
  CONFIGURATION: Release
  # Packages Directory
  PACKAGES_DIR: ./artifacts/packages-results
  # Test Results Directory
  TEST_RESULTS_DIR: ./artifacts/test-results
  # Set the NuGet packages restore cache directory.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  # Disable the Husky pre-commit hooks.
  HUSKY: 0

jobs:
  build:
    name: Build and pack
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false
          fetch-depth: 0
          persist-credentials: false

      - name: "Setup .NET SDK"
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: "./global.json"

      # Required: the dashboard SPAs are pre-built in the "Build dashboard SPAs"
      # step below (before the NuGet token is present), so the token-bearing
      # solution build runs with BuildDashboardSpa=false and never executes npm
      # lifecycle scripts while the credential is available in the environment.
      - name: "Setup Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            src/Headless.Jobs.Dashboard/wwwroot/package-lock.json
            src/Headless.Messaging.Dashboard/wwwroot/package-lock.json

      - name: "Setup nuget cache"
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', 'global.json', 'nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Build the dashboard SPAs BEFORE the NuGet token is present, so a malicious
      # dependency lifecycle script run by `npm ci` cannot read it. The token is
      # injected only on the "Format, build, and pack" step below, which runs with
      # BuildDashboardSpa=false and only embeds the already-built wwwroot/dist.
      - name: "Build dashboard SPAs"
        run: make dashboards
        shell: bash

      - name: "Format check"
        run: make format-check

      - name: "Build"
        # Dashboards are already built above (before the token is present), so the
        # solution build runs with BuildDashboardSpa=false and no lifecycle scripts
        # run while the credential is available. GITHUB_PACKAGES_TOKEN is scoped to
        # this restore/build step only and is expanded from nuget.config's
        # %GITHUB_PACKAGES_TOKEN% credential entry.
        env:
          BuildDashboardSpa: "false"
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make rebuild

      - name: "Unit tests with coverage"
        run: make ci-test

      - name: "Generate coverage summary"
        if: always()
        run: |
          set -euo pipefail

          if [ -d "${TEST_RESULTS_DIR}" ] && find "${TEST_RESULTS_DIR}" -name '*.cobertura.xml' -print -quit | grep -q .; then
            dotnet reportgenerator \
              -reports:"${TEST_RESULTS_DIR}/**/*.cobertura.xml" \
              -targetdir:"./artifacts/coverage/report" \
              -reporttypes:"Html;JsonSummary"
          else
            echo "::warning::No Cobertura coverage files were found under ${TEST_RESULTS_DIR}."
          fi
        shell: bash

      - name: "Pack"
        run: make pack-built

      - name: "Verify package artifacts"
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=("${PACKAGES_DIR}"/*.nupkg)
          symbols=("${PACKAGES_DIR}"/*.snupkg)

          if [ "${#packages[@]}" -eq 0 ]; then
            echo "No .nupkg files were created in ${PACKAGES_DIR}."
            exit 1
          fi

          if [ "${#symbols[@]}" -eq 0 ]; then
            echo "No .snupkg files were created in ${PACKAGES_DIR}."
            exit 1
          fi

          echo "Created ${#packages[@]} package(s) and ${#symbols[@]} symbol package(s)."
        shell: bash

      - name: "Upload test results"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: |
            artifacts/test-results/**/*.trx
            artifacts/test-results/**/*.dmp
          if-no-files-found: warn
          retention-days: 14

      - name: "Upload coverage results"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-results
          path: |
            artifacts/test-results/**/*.cobertura.xml
            artifacts/test-results/**/*.coverage
            artifacts/coverage/report/**
          if-no-files-found: warn
          retention-days: 14

      - name: "Publish Artifacts"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: packages-results
          path: ${{ env.PACKAGES_DIR }}
          if-no-files-found: error

  push-github-packages:
    name: "Push GitHub Packages"
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    environment:
      name: "GitHub Packages"
      url: https://github.com/xshaheen/headless-framework/packages

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            dotnet nuget push "$symbol" \
              --source "https://nuget.pkg.github.com/xshaheen/index.json" \
              --api-key "$GITHUB_TOKEN" \
              --skip-duplicate
          done
        shell: bash

  push-nuget-packages:
    name: "Push nuget.org packages"
    needs: push-github-packages
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read

    environment:
      name: "NuGet Release"
      url: https://www.nuget.org/packages?q=Headless.

    steps:
      - name: "Download Artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-results

      - name: "Push Packages"
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          packages=(./*.nupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in the downloaded package artifact."
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate
          done

          symbols=(./*.snupkg)

          for symbol in "${symbols[@]}"; do
            if ! unzip -Z1 "$symbol" | grep -Eiq '\.pdb$'; then
              echo "Skipping $symbol because it does not contain any .pdb files."
              continue
            fi

            dotnet nuget push "$symbol" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate \
              || echo "::warning::Skipping failed symbol package push for $symbol."
          done
        shell: bash
