name: Dashboards

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/dashboards.yml'
      - 'src/Headless.Jobs.Dashboard/wwwroot/**'
      - 'src/Headless.Messaging.Dashboard/wwwroot/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - '.github/workflows/dashboards.yml'
      - 'src/Headless.Jobs.Dashboard/wwwroot/**'
      - 'src/Headless.Messaging.Dashboard/wwwroot/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "Build SPA & verify dist"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dashboard:
          - src/Headless.Jobs.Dashboard/wwwroot
          - src/Headless.Messaging.Dashboard/wwwroot
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.3
        with:
          lfs: false

      - name: "Setup Node"
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.dashboard }}/package-lock.json

      - name: "Install dependencies"
        working-directory: ${{ matrix.dashboard }}
        run: npm ci

      - name: "Build dashboard"
        working-directory: ${{ matrix.dashboard }}
        run: npm run build

      - name: "Verify committed dist is up to date"
        working-directory: ${{ matrix.dashboard }}
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::Committed wwwroot/dist is stale. Run 'make dashboards' (or 'npm ci && npm run build') and commit the result."
            git -c color.ui=always diff --stat -- dist
            exit 1
          fi
