services:
  redis-node-0:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    volumes:
      - redis-cluster_data-0:/bitnami/redis/data
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'

  redis-node-1:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    volumes:
      - redis-cluster_data-1:/bitnami/redis/data
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'

  redis-node-2:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    volumes:
      - redis-cluster_data-2:/bitnami/redis/data
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'

  redis-node-3:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    volumes:
      - redis-cluster_data-3:/bitnami/redis/data
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'

  redis-node-4:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    volumes:
      - redis-cluster_data-4:/bitnami/redis/data
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'

  redis-node-5:
    image: docker.io/bitnamilegacy/redis-cluster:7.0.15@sha256:84f3c451737aeef420ba00d2320f53bb1757863190d6d42693cc341c29809398
    ports:
     - 6379:6379
    volumes:
      - redis-cluster_data-5:/bitnami/redis/data
    depends_on:
      - redis-node-0
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
    environment:
      - 'REDIS_PASSWORD=headless'
      - 'REDISCLI_AUTH=headless'
      - 'REDIS_CLUSTER_REPLICAS=1'
      - 'REDIS_NODES=redis-node-0 redis-node-1 redis-node-2 redis-node-3 redis-node-4 redis-node-5'
      - 'REDIS_CLUSTER_CREATOR=yes'

  db:
     image: "mcr.microsoft.com/mssql/server:2022-latest@sha256:ba4c8329f48fb8f02e1416be6a930ebfd71268caee78aa985f3af4315e457c89"
     ports:
        - 1433:1433
     environment:
       SA_PASSWORD: "P@ssw0rd"
       ACCEPT_EULA: "Y"

  redis-sample:
    build:
     context: ../..
     dockerfile: demo/Headless.Messaging.Redis.SqlServer.Demo/Dockerfile
    environment:
     - ASPNETCORE_URLS=http://*:8080
     - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - 8080:8080
    depends_on:
     - db
     - redis-node-5

volumes:
  redis-cluster_data-0:
    driver: local
  redis-cluster_data-1:
    driver: local
  redis-cluster_data-2:
    driver: local
  redis-cluster_data-3:
    driver: local
  redis-cluster_data-4:
    driver: local
  redis-cluster_data-5:
    driver: local
